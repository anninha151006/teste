  <section class="contato" id="contato">
    <p class="section-label">✦ Fale conosco</p>
    <h2 class="section-title">Entre em Contato</h2>
    <div class="divider"></div>
    <div class="contato-box">
      <form action="#" method="post">
        <div class="form-group">
          <label for="nome">Seu nome</label>
          <input type="text" id="nome" name="nome" placeholder="Como podemos te chamar?" required />
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required />
        </div>
        <div class="form-group">
          <label for="msg">Mensagem</label>
          <textarea id="msg" name="msg" placeholder="Fale sobre sua encomenda ou dúvida..." required></textarea>
        </div>
        <button type="submit" class="btn" style="width:100%; text-align:center; border:none; cursor:pointer;">
          Enviar Mensagem ✦
        </button>
      </form>
    </div>

    <div class="contato-links">
      <a href="https://www.instagram.com/hana___mori/" class="contato-link" target="_blank">

    </div>
  </section>
